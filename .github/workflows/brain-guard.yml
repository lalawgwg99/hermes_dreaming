name: Brain Guard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Validate knowledge pages
        run: python -m brain.cli validate

      - name: Run tests
        run: pip install pytest && python -m pytest tests/ -v
